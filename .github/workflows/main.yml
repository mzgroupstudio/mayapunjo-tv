name: Auto Update Playlist

on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট পর পর
  workflow_dispatch: # ম্যানুয়ালি চালানোর জন্য

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # এটি অ্যাকশনকে ফাইল রাইট করার ক্ষমতা দেয়
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run update script
        run: python update_playlist.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Mayapunjo_Final.m3u
          
          # যদি কোনো পরিবর্তন থাকে তবেই কমিট করবে
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto updated playlist: $(date)"
            git push
          fi
