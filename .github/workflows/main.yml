name: Auto Update Playlist

on:
  schedule:
    # প্রতি ৩০ মিনিট পর পর চালানোর জন্য নিচের লাইনটি ব্যবহার করুন
    - cron: '*/30 * * * *' 
  workflow_dispatch: # ম্যানুয়ালি চালানোর জন্য

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        run: python update_playlist.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Mayapunjo_Final.m3u
          git commit -m "Auto updated playlist" || exit 0
          git push
