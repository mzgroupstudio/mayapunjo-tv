name: Update Mayapunjo Playlist

on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট পরপর অটোমেটিক চলবে
  workflow_dispatch: # এটি আপনাকে ম্যানুয়ালি 'Run workflow' করার বাটন দেবে

permissions:
  contents: write # ফাইল সেভ করার জন্য এই পারমিশনটি জরুরি

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        run: python update_playlist.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Mayapunjo_Final.m3u
          # তারিখ ও সময়সহ সেভ মেসেজ দেখাবে
          git commit -m "Updated Mayapunjo_Final.m3u at $(date)" || echo "No changes to commit"
          git push
